<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password - Konjyosom Tech</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.login-page { min-height: 100vh; display: flex; align-items: center; background: var(--gradient); }
.login-card { background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 25px 80px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
.btn-login { background: var(--gradient); border: none; color: white; font-weight: 600; padding: 0.875rem; border-radius: 10px; transition: all 0.3s ease; }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(26,82,118,0.3); }
</style>
</head>
<body>
<div class="login-page">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">
<div class="login-card mx-auto text-center">
<i class="fas fa-lock fa-3x text-primary mb-3"></i>
<h3 class="mb-2">Set Your Password</h3>
<p class="text-muted mb-4">First login detected. Please set a new password to continue.</p>
<form id="passwordForm">
<div class="mb-3 text-start">
<label class="form-label">New Password</label>
<div class="input-group"><span class="input-group-text"><i class="fas fa-lock"></i></span><input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required minlength="6"></div>
<small class="text-muted">Minimum 6 characters</small>
</div>
<div class="mb-4 text-start">
<label class="form-label">Confirm Password</label>
<div class="input-group"><span class="input-group-text"><i class="fas fa-lock"></i></span><input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required minlength="6"></div>
</div>
<button type="submit" class="btn btn-login w-100 py-3"><i class="fas fa-save me-2"></i>Set Password & Continue</button>
</form>
</div>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
if (!Auth.isLoggedIn()) window.location.href = '../login.html';
document.getElementById('passwordForm').addEventListener('submit', async (e) => { e.preventDefault(); const newPass = document.getElementById('newPassword').value; const confirm = document.getElementById('confirmPassword').value; if (newPass !== confirm) { showAlert('danger', 'Passwords do not match'); return; } if (newPass.length < 6) { showAlert('danger', 'Password must be at least 6 characters'); return; } try { const response = await Auth.apiCall('/auth/first-login-change', { method: 'PUT', body: JSON.stringify({ newPassword: newPass }) }); const data = await response.json(); if (data.success) { showAlert('success', 'Password set! Redirecting...'); setTimeout(() => window.location.href = 'dashboard.html', 1500); } else { showAlert('danger', data.message || 'Failed to set password'); } } catch (error) { showAlert('danger', 'Failed to set password'); } });
</script>
</body>
</html>
